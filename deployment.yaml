apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app-deployment
  labels:
    app: secure-web
spec:
  replicas: 2 # High Availability principle
  selector:
    matchLabels:
      app: secure-web
  template:
    metadata:
      labels:
        app: secure-web
    spec:
      # Principle 1: Least Privilege (Security Context)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: web-container
        image: nginx:alpine
        ports:
        - containerPort: 80
        # Principle 2: Resource Sandboxing (Prevent DoS)
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
        # Principle 3: Health Monitoring (Self-Healing)
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 3
